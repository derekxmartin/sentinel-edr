# AkesoEDR Agent Configuration
#
# All values shown below are the compiled-in defaults.
# Uncomment and change a line to override.
# Missing file or missing keys = defaults are used.

[paths]
# log_path = C:\AkesoEDR\agent_events.jsonl
# amsi_dll = C:\AkesoEDR\akesoedr-amsi.dll
# rules_dir = C:\AkesoEDR\rules
# yara_rules_dir = C:\AkesoEDR\yara-rules

[scanner]
# max_file_size_mb = 50
# max_region_size_mb = 10
# cache_ttl_sec = 300

[logging]
# max_log_size_mb = 100

[network]
# max_events_per_sec = 100

[git]
# rules_repo_url = https://github.com/org/akesoedr-rules.git
# yara_rules_repo_url = https://github.com/org/akesoedr-yara-rules.git

[output.siem]
# enabled = false
# endpoint = https://siem.example.com/api/ingest
# api_key = your-api-key-here
# batch_size = 100
# flush_interval_sec = 10
# spill_max_size_mb = 500
