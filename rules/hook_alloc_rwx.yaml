# Detection: Suspicious RWX memory allocation
# ATT&CK: T1055 - Process Injection
# Detects NtAllocateVirtualMemory with PAGE_EXECUTE_READWRITE (0x40)

name: Suspicious RWX allocation
source: HookDll
severity: high
action: LOG
conditions:
  - field: payload.function
    op: equals
    value: NtAllocateVirtualMemory
  - field: payload.protection
    op: equals
    value: "0x40"
